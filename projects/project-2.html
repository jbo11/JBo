<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project</title>

  <!-- USE SAME CSS -->
  <link rel="stylesheet" href="project.css" />

  <style>
    :root{ --accent:#f4ca30; }

    html, body { height: 100%; overflow: hidden; }

    #fullpage-works { height: 100vh; width: 100vw; transition: transform 0.85s cubic-bezier(.77,0,.175,1); }

    .page { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }

    /* Back to ... */
    .back { position: absolute; top: 30px; left: 40px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; z-index: 998;}
    .back:hover { color: var(--accent); }

    /* GALLERY */
    .container{width:min(1500px,90%);margin:0 auto;position:relative;z-index:2}
    .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; max-width: 1100px; margin: 0 auto; }
    .gallery-img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; transition: 0.4s; }
    .gallery-img:hover { transform: scale(1.05); filter: brightness(70%);}
    .page-gallery { background: #f6f6f6; }
    .gallery-arrows { color: var(--accent); font-size: 2.5em; text-align: center; margin-top: 20px; cursor: pointer; transition: 0.3s; }
    .gallery-arrows:hover { transform: translateY(5px); opacity: 0.7; }

    #fullpage { opacity: 0; }

  </style>
</head>
<body>

<a href="index.html#page3" class="back" onclick="sessionStorage.setItem('targetPage','page3')">← Back to Projects</a>

<!-- FULLPAGE WRAPPER -->
<main id="fullpage-works">

  <!-- SECTION 1: GALLERY -->
  <section class="page page-gallery is-active" id="websitesSection1">

    <div class="container">
        <p class="eyebrow center">
        <span>GRAPHIC DESIGNS</span><br>
        Strategic design solutions tailored to business goals
        </p>

        <div class="works-grid">
        <a class="work" href="https://sites.google.com/view/jbbo/graphic-design?authuser=0">
            <div class="work-img" style="background-image:url('https://images.pexels.com/photos/2576194/pexels-photo-2576194.jpeg?_gl=1*inkspq*_ga*MjA3NjM4MDg3OS4xNzc3NTY2NjI2*_ga_8JE65Q40S6*czE3Nzc1NjY2MjYkbzEkZzEkdDE3Nzc1NjgwNTkkajE2JGwwJGgw')"></div>
            <div class="work-info"><h4>Graphic Designs</h4><span>Photoshop · Illustrator · In-Design · Canva</span></div>
        </a>
        </div>
    </div>
  </section>
</main>

<script src="project.js"></script>

</body>
</html>
